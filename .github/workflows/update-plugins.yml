name: Auto Update Plugins (12 AM IST)

on:
  schedule:
    # 18:30 UTC is exactly 00:00 AM IST
    - cron: '30 18 * * *'
  workflow_dispatch: # Allows you to run it manually from the Actions tab

permissions:
  contents: write

jobs:
  generate-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Fetch Script
        run: node update-plugins.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add plugins.json
          
          # This checks if there are any actual changes before trying to commit
          if ! git diff-index --quiet HEAD; then
            git commit -m "Auto-update plugins.json [skip ci]"
            git push
            echo "Successfully updated and pushed plugins.json"
          else
            echo "No changes found in source repositories. Skipped commit."
          fi
